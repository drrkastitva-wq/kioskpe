name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Prepare Android signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/app/release-keystore.jks
          cat > apps/mobile/key.properties <<'EOF'
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=android/app/release-keystore.jks
          EOF
        working-directory: apps/mobile

      - name: Build release APK
        run: flutter build apk --release
        working-directory: apps/mobile

      - name: Build release App Bundle
        run: flutter build appbundle --release
        working-directory: apps/mobile

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: letslegal-release-artifacts
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
